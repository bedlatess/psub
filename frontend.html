<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线订阅转换</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; box-shadow: 0 2px 4px rgba(0,0,0,.04); }
        /* 确保导航栏链接垂直居中 */
        .nav-link { display: flex !important; align-items: center; }
        /* Telegram 图标特定颜色 */
        .fa-telegram { color: #0088cc; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-light bg-white">
            <div class="container">
                <a class="navbar-brand" href="#">{{ title }}</a>
                
                <div class="ml-auto d-flex align-items-center">
                    <a href="https://t.me/bedlate" target="_blank" class="nav-link text-dark mr-3" title="Telegram">
                        <i class="fab fa-telegram fa-lg mr-2"></i>
                        <span>Telegram</span>
                    </a>
                    <a :href="github" target="_blank" class="nav-link text-dark">
                        <i class="fab fa-github fa-lg"></i>
                    </a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">定制转换规则</h5>
                        </div>
                        <div class="card-body">
                            <p class="text-muted text-center">转换站正在运行中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.47/dist/vue.global.prod.js"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    // 3. 修改 Vue 内部的标题变量，防止加载后跳回 sub-web
                    title: '在线订阅转换',
                    github: 'https://github.com/bedlatess/psub'
                }
            },
            mounted() {
                // 确保页面加载完成后标题正确
                document.title = this.title;
            }
        });
        app.mount('#app');
    </script>
</body>
</html>
