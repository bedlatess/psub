
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线订阅转换</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; box-shadow: 0 2px 4px rgba(0,0,0,.04); }
        .nav-link { display: flex !important; align-items: center; }
        .fa-telegram { color: #0088cc; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-light bg-white">
            <div class="container">
                <a class="navbar-brand" href="#">{{ title }}</a>
                <div class="ml-auto d-flex align-items-center">
                    <a href="https://t.me/bedlate" target="_blank" class="nav-link text-dark mr-3">
                        <i class="fab fa-telegram fa-lg mr-2"></i>
                        <span style="font-weight: 500;">Telegram</span>
                    </a>
                    <a :href="github" target="_blank" class="nav-link text-dark">
                        <i class="fab fa-github fa-lg"></i>
                    </a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white"><h5 class="mb-0">定制转换规则</h5></div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>订阅链接</label>
                                <textarea class="form-control" v-model="sourceLinks" rows="3" placeholder="支持多个链接，每行一个"></textarea>
                            </div>
                            <div class="form-group">
                                <label>客户端</label>
                                <select class="form-control" v-model="client">
                                    <option value="clash">Clash</option>
                                    <option value="v2ray">V2Ray</option>
                                    <option value="singbox">Sing-box</option>
                                </select>
                            </div>
                            <div class="text-center mt-4">
                                <button class="btn btn-primary px-5" @click="generateLink">生成链接</button>
                            </div>
                            <div v-if="generatedLink" class="mt-4">
                                <label>生成的链接</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" :value="generatedLink" readonly>
                                    <div class="input-group-append">
                                        <button class="btn btn-outline-secondary" @click="copyLink">复制</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.47/dist/vue.global.prod.js"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    title: '在线订阅转换',
                    github: 'https://github.com/bedlatess/psub',
                    sourceLinks: '',
                    client: 'clash',
                    generatedLink: ''
                }
            },
            mounted() {
                document.title = this.title;
            },
            methods: {
                generateLink() {
                    if (!this.sourceLinks) { alert('请输入订阅链接'); return; }
                    this.generatedLink = window.location.origin + '/sub?target=' + this.client + '&url=' + encodeURIComponent(this.sourceLinks);
                },
                copyLink() {
                    navigator.clipboard.writeText(this.generatedLink);
                    alert('已复制到剪贴板');
                }
            }
        });
        app.mount('#app');
    </script>
</body>
</html>
